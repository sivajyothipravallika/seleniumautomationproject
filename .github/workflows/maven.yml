name: Test Automation Workflow

on:
  #schedule:
    # - cron: 00 18 * * *
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Running Test Automation Framework with Maven
      run: mvn test -X -Dbrowser=chrome -DisLambdaTest=false -DisHeadless=false

    - name: Upload Test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Test logs
        path: logs/

    - name: Upload Screenshots as Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Test Reports
        path: reports/login_test_report.html

    - name: Prepare deployment directory
      if: always()
      run: |
        mkdir -p public/extent-reports
        if [ -f reports/login_test_report.html ]; then
          cp reports/login_test_report.html public/extent-reports/
        fi
        if [ -d screenshots ]; then
          cp -r screenshots public/extent-reports/
        fi
        ls -la

    - name: Deploy Test Reports to GitHub Pages
      if: always()
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: public/extent-reports/
        token: ${{ secrets.PAT_PAGES }}
        clean: true

    - name: Test Execution Status
      run: echo "Test Execution Completed"
